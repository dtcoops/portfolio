<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect to index.html, preserving the original path as a query param
      const path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(
        window.location.origin + '/portfolio/?redirect=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
